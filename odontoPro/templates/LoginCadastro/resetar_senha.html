{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Redefinir Senha</title>
  <link rel="stylesheet" href="{% static 'css/LoginCadastro/login.css' %}">
</head>
<body>

<a href="/" class="back-home-link" style="display:inline-block;margin:20px 0;font-weight:600;color:#1b4ed8;text-decoration:none;">← Voltar para a Home</a>

<h2>Redefinir senha</h2>

<form method="POST">
  {% csrf_token %}

  <label>E-mail</label>
  <input type="email" name="email" required>

  <label>Nova senha</label>
  <input type="password" name="senha" required>

  <button type="submit">Salvar</button>
</form>

</body>
</html>
